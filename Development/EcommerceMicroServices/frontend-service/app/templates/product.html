<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products - E-commerce Store</title>

    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #121212; /* Dark theme background */
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #343a40; /* Dark navbar */
        }
        .navbar a {
            color: #f8f9fa; /* Light text for links */
        }
        .hero-section {
            background-size: cover;
            background-position: center;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero-text h1 {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
            animation: fadeInUp 1s ease-in-out;
        }
        .hero-text p {
            font-size: 1.5rem;
            margin-bottom: 20px;
            animation: fadeInUp 1.5s ease-in-out;
        }
        .cta {
            padding: 12px 24px;
            text-transform: uppercase;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            animation: fadeInUp 2s ease-in-out;
        }
        .footer {
            background-color: #343a40;
            color: white;
            padding: 20px;
            text-align: center;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="/">E-commerce</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
    </nav>

    <!-- Product Grid -->
    <div class="container">
        <h1 class="text-center my-4 text-white">Product Management</h1>

        <!-- Add Product Button -->
        <div class="text-center mb-4">
            <a href="/add-product" class="btn btn-success">Add Product</a>
        </div>

        <!-- Search Bar -->
        <div class="container mb-4">
            <div class="row">
                <div class="col-md-12">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search for products..." onkeyup="filterProducts()">
                </div>
            </div>
        </div>

        <div class="row" id="productGrid">
            <!-- Products will be dynamically added here -->
        </div>
    </div>

    <!-- Footer Section -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 E-commerce. All Rights Reserved.</p>
            <p><a href="/privacy-policy" class="text-white">Privacy Policy</a> | <a href="/terms-of-service" class="text-white">Terms of Service</a></p>
        </div>
    </footer>

    <!-- Bootstrap JS, Popper.js, and jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="static/config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetchProducts(); // Fetch products on page load
            setDynamicProduct(); // Set dynamic product details
        });

        function setDynamicProduct() {
            const dynamicProduct = {
                name: "Product Y", // Replace with dynamic product data
                description: "The latest in tech innovation.",
                price: "R7,999"
            };

            document.getElementById("dynamicProductName").innerText = dynamicProduct.name;
            document.getElementById("dynamicProductDescription").innerText = dynamicProduct.description;
            document.getElementById("dynamicProductPrice").innerText = "Now from " + dynamicProduct.price;
        }

        function fetchProducts() {
            const apiUrl = env.API_URL;  // Use env variable for API endpoint
            fetch(`${apiUrl}/store/products`)
                .then(response => response.json())
                .then(renderProducts)
                .catch(error => console.error("Fetch error:", error));
        }

        function renderProducts(products) {
            const productGrid = document.getElementById("productGrid");
            productGrid.innerHTML = ''; // Clear the existing product grid

            products.forEach(product => {
                const apiUrl = env.API_URL;
                const productCard = `
                    <div class="col-md-4 d-flex align-items-stretch product-card" data-name="${product.name.toLowerCase()}">
                        <div class="card mb-4 shadow-sm bg-dark text-white">
                            <img src="${apiUrl}/${product.image_url}" class="card-img-top img-fluid" alt="${product.name}" style="height: auto; max-height: 250px; object-fit: contain;">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${product.name}</h5>
                                <p class="card-text">${product.description}</p>
                                <p class="card-text"><strong>$ ${product.price}</strong></p>
                                <a href="/edit-product/${product.id}" class="btn btn-warning">Edit</a>
                                <button class="btn btn-danger" onclick="deleteProduct(${product.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
                productGrid.innerHTML += productCard; // Append the product card to the grid
            });
        }

        function filterProducts() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const productCards = document.getElementsByClassName('product-card');

            Array.from(productCards).forEach(card => {
                const productName = card.getAttribute('data-name').toLowerCase();
                card.style.display = productName.includes(input) ? '' : 'none'; // Show or hide product
            });
        }

        function deleteProduct(id) {
            const apiUrl = env.API_URL;
            if (confirm("Are you sure you want to delete this product?")) {
                fetch(`${apiUrl}/store/products/${id}`, {
                    method: 'DELETE',
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Network response was not ok");
                    }
                    fetchProducts(); // Refresh product list
                    alert("Product deleted successfully!");
                })
                .catch(error => {
                    console.error("Fetch error:", error);
                    alert("Error deleting product: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
