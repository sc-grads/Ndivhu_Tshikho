<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Store</title>

    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #121212; /* Dark theme background */
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #343a40; /* Dark navbar */
        }
        .navbar a {
            color: #f8f9fa; /* Light text for links */
        }
        .hero-section {
            background-size: cover;
            background-position: center;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            position: relative;
        }
        .hero-text h1 {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
        }
        .hero-text p {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .cta {
            padding: 12px 24px;
            text-transform: uppercase;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }
        .footer {
            background-color: #343a40;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="#">E-commerce</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/register">Register</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/shop">Shop</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero-section" style="background-image: url('/static/images/ecommerce-banner.jpg');">
    <!-- Hero Section -->
    <div class="hero-section" style="background-image: url('/static/images/ecommerce-banner.jpg');">
        <div class="hero-text">
            <h1 id="dynamicProductName">Introducing Product X</h1>
            <p id="dynamicProductDescription">Revolutionary technology, available now</p>
            <p class="price" id="dynamicProductPrice">Now from R9,999</p>
            <a href="/shop" class="cta">Shop Now</a>
        </div>
    </div>
    </div>

<!-- Product Grid -->
<div class="container">
    <div class="row" id="productGrid">
        <!-- Products will be dynamically added here -->
    </div>
</div>


    <!-- Footer Section -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 E-commerce. All Rights Reserved.</p>
            <p><a href="/privacy-policy" class="text-white">Privacy Policy</a> | <a href="/terms-of-service" class="text-white">Terms of Service</a></p>
        </div>
    </footer>

    <!-- Bootstrap JS, Popper.js, and jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="static/config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetchProducts(); // Fetch products on page load
            setDynamicProduct(); // Set dynamic product details
        });

        function setDynamicProduct() {
            const dynamicProduct = {
                name: "Product Y", // Replace with dynamic product data
                description: "The latest in tech innovation.",
                price: "R7,999"
            };

            document.getElementById("dynamicProductName").innerText = dynamicProduct.name;
            document.getElementById("dynamicProductDescription").innerText = dynamicProduct.description;
            document.getElementById("dynamicProductPrice").innerText = "Now from " + dynamicProduct.price;
        }

        function fetchProducts() {
            const apiUrl = env.API_URL;  // Use env variable for API endpoint
            fetch(`${apiUrl}/store/products`)
                .then(response => response.json())
                .then(renderProducts)
                .catch(error => console.error("Fetch error:", error));
        }

        function renderProducts(products) {
            const productGrid = document.getElementById("productGrid");
            productGrid.innerHTML = ''; // Clear the existing product grid

            products.forEach(product => {
                const apiUrl = env.API_URL;
                const productCard = `
                    <div class="col-md-4 d-flex align-items-stretch product-card" data-name="${product.name.toLowerCase()}">
                        <div class="card mb-4 shadow-sm bg-dark text-white">
                            <img src="${apiUrl}/${product.image_url}" class="card-img-top img-fluid" alt="${product.name}" style="height: auto; max-height: 250px; object-fit: contain;">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${product.name}</h5>
                                <p class="card-text">${product.description}</p>
                                <p class="card-text"><strong>$ ${product.price}</strong></p>
                            </div>
                        </div>
                    </div>
                `;
                productGrid.innerHTML += productCard; // Append the product card to the grid
            });
        }



       
    
    </script>
</body>
</html>
