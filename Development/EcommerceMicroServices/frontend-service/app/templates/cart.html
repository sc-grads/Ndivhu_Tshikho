<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Functionality</title>

    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .cart-preview {
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .cart-item button {
            background-color: transparent;
            border: none;
            color: red;
            font-size: 1.2em;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <h1>Shopping Cart</h1>

    <!-- Cart Section -->
    <div class="cart-preview my-4">
        <h2>Your Cart</h2>
        <div id="cartItems">
            <p>No items in the cart yet.</p>
        </div>
        <button class="btn btn-success mt-3" onclick="checkout()">Checkout</button>
    </div>

    <!-- Product Listing Section -->
    <h2>Available Products</h2>
    <div class="row" id="productGrid">
        <!-- Products will be dynamically added here -->
    </div>
</div>

<!-- Bootstrap JS, Popper.js, and jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    // Cart array to store the items
    let cart = [];

    // Simulating product fetching from API (replace with actual API call)
    const products = [
        { id: 1, name: "Product 1", price: 10, description: "Description 1" },
        { id: 2, name: "Product 2", price: 20, description: "Description 2" },
        { id: 3, name: "Product 3", price: 30, description: "Description 3" },
    ];

    // Load products on page load
    document.addEventListener("DOMContentLoaded", function() {
        renderProducts();
        renderCart();
    });

    function renderProducts() {
        const productGrid = document.getElementById("productGrid");
        productGrid.innerHTML = ''; // Clear the grid before re-rendering

        products.forEach(product => {
            const productCard = `
                <div class="col-md-4">
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="card-text">${product.description}</p>
                            <p class="card-text"><strong>$${product.price}</strong></p>
                            <button class="btn btn-primary" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `;
            productGrid.innerHTML += productCard;
        });
    }

    // Add product to cart
    function addToCart(productId, productName, productPrice) {
        const existingProduct = cart.find(item => item.id === productId);

        if (existingProduct) {
            existingProduct.quantity += 1; // If product exists, increase the quantity
        } else {
            cart.push({ id: productId, name: productName, price: productPrice, quantity: 1 });
        }

        renderCart(); // Update the cart preview
    }

    // Remove product from cart
    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        renderCart(); // Update the cart preview
    }

    // Render cart items
    function renderCart() {
        const cartItems = document.getElementById("cartItems");
        cartItems.innerHTML = ''; // Clear the existing cart items

        if (cart.length === 0) {
            cartItems.innerHTML = '<p>No items in the cart yet.</p>';
        } else {
            cart.forEach(item => {
                const cartItem = `
                    <div class="cart-item">
                        <p>${item.name} - $${item.price} x ${item.quantity}</p>
                        <button onclick="removeFromCart(${item.id})">&times;</button>
                    </div>
                `;
                cartItems.innerHTML += cartItem;
            });
        }
    }

    // Checkout functionality (stub, replace with actual API call)
    function checkout() {
        if (cart.length === 0) {
            alert("Your cart is empty!");
            return;
        }

        // Simulate checkout process (replace with actual API call)
        alert("Proceeding to checkout with items: " + JSON.stringify(cart));

        // Clear the cart after checkout
        cart = [];
        renderCart();
    }
</script>

</body>
</html>
